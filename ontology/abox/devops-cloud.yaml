    type: depends_on
  - from: observability
    to: linux-basics
    type: depends_on
  - from: micrometer
    to: observability
    type: depends_on
  - from: scalability
    to: observability
    type: depends_on
  - from: health-check
    to: scalability
    type: depends_on
  - from: serverless
    to: scalability
    type: references
  - from: scale-up-out
    to: scalability
    type: depends_on
  - from: infrastructure-as-code
    to: ci-cd
    type: depends_on
  - from: zero-downtime-deploy
    to: health-check
    type: depends_on
  - from: graceful-shutdown
