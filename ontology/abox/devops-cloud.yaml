domain:
  id: devops-cloud
  name: DevOps와 Cloud
  summary: |
    배포, 관측, 확장, 테스트, 인프라 자동화처럼 애플리케이션을 안정적으로
    운영하기 위한 실무형 질문을 정리한다.
  wiki_root: wiki/devops-cloud/

entities:
  - id: linux-basics
    name: Linux 기본
    type: process
    summary: 프로세스, 권한, 로그, 네트워크 도구로 서버 상태를 확인하고 문제를 추적한다.
    repo: cs-theory-notes
    package: devops/linux
    wiki_doc: wiki/devops-cloud/README.md
  - id: container
    name: Container
    type: process
    summary: 애플리케이션과 실행 환경을 이미지로 묶어 어디서나 같은 방식으로 실행한다.
    repo: cs-theory-notes
    package: devops/container
    wiki_doc: wiki/devops-cloud/README.md
  - id: virtualization
    name: Virtualization
    type: process
    summary: 물리 자원을 논리적으로 나누어 VM, 가상 네트워크, 가상 스토리지를 제공한다.
    repo: cs-theory-notes
    package: devops/virtualization
    wiki_doc: wiki/devops-cloud/README.md
  - id: raid
    name: RAID
    type: process
    summary: 여러 디스크를 묶어 성능, 가용성, 복구성을 조절하는 저장장치 구성 방식이다.
    repo: cs-theory-notes
    package: devops/raid
    wiki_doc: wiki/devops-cloud/README.md
  - id: ci-cd
    name: CI/CD
    type: process
    summary: 테스트, 빌드, 배포를 자동화해 작은 변경을 빠르고 반복 가능하게 반영한다.
    repo: cs-theory-notes
    package: devops/ci-cd
    wiki_doc: wiki/devops-cloud/README.md
  - id: gradle
    name: Gradle
    type: process
    summary: JVM 프로젝트의 컴파일, 테스트, 패키징, 의존성 관리를 자동화하는 빌드 도구다.
    repo: cs-theory-notes
    package: devops/gradle
    wiki_doc: wiki/devops-cloud/README.md
  - id: observability
    name: Observability
    type: process
    summary: 로그, 메트릭, 트레이스로 시스템 내부 상태와 장애 원인을 추론한다.
    repo: cs-theory-notes
    package: devops/observability
    wiki_doc: wiki/devops-cloud/README.md
  - id: micrometer
    name: Micrometer
    type: process
    summary: 애플리케이션 메트릭을 수집해 Prometheus, Datadog 같은 모니터링 시스템으로 보낸다.
    repo: cs-theory-notes
    package: devops/micrometer
    wiki_doc: wiki/devops-cloud/README.md
  - id: scalability
    name: 확장성과 장애 대응
    type: process
    summary: 서버 증설, 헬스체크, 배포 전략, 롤백으로 트래픽과 장애에 대응한다.
    repo: cs-theory-notes
    package: devops/scalability
    wiki_doc: wiki/devops-cloud/README.md
  - id: health-check
    name: Health Check
    type: process
    summary: 서버가 요청을 받을 수 있는 상태인지 확인해 배포 검증과 트래픽 제외에 사용한다.
    repo: cs-theory-notes
    package: devops/health-check
    wiki_doc: wiki/devops-cloud/README.md
  - id: serverless
    name: Serverless
    type: process
    summary: 인프라 관리는 클라우드가 맡고 개발자는 함수나 관리형 서비스를 조합한다.
    repo: cs-theory-notes
    package: devops/serverless
    wiki_doc: wiki/devops-cloud/README.md
  - id: scale-up-out
    name: Scale Up과 Scale Out
    type: process
    summary: 서버 사양을 키우는 방식과 서버 대수를 늘리는 방식의 비용·가용성 차이를 비교한다.
    repo: cs-theory-notes
    package: devops/scale
    wiki_doc: wiki/devops-cloud/README.md
  - id: infrastructure-as-code
    name: Infrastructure as Code
    type: process
    summary: 인프라 구성을 코드로 관리해 변경 이력, 재현성, 자동화를 확보한다.
    repo: cs-theory-notes
    package: devops/iac
    wiki_doc: wiki/devops-cloud/README.md
  - id: zero-downtime-deploy
    name: 무중단 배포
    type: process
    summary: 롤링, 블루/그린, 카나리 방식으로 서비스 중단 없이 새 버전을 배포한다.
    repo: cs-theory-notes
    package: devops/zero-downtime
    wiki_doc: wiki/devops-cloud/README.md
  - id: graceful-shutdown
    name: Graceful Shutdown
    type: process
    summary: 종료 신호를 받으면 새 요청을 막고 진행 중 작업과 리소스 정리를 마친 뒤 종료한다.
    repo: cs-theory-notes
    package: devops/graceful-shutdown
    wiki_doc: wiki/devops-cloud/README.md
  - id: test-strategy
    name: 테스트 전략
    type: process
    summary: 테스트 더블, 단위·통합·슬라이스 테스트, 격리, 커버리지로 변경 안전성을 높인다.
    repo: cs-theory-notes
    package: devops/test-strategy
    wiki_doc: wiki/devops-cloud/README.md
  - id: logs-metrics
    name: Log와 Metric
    type: data
    summary: 로그는 사건 맥락, 메트릭은 수치화된 상태를 보여주며 운영 판단의 근거가 된다.
    repo: cs-theory-notes
    package: devops/logs-metrics
    wiki_doc: wiki/devops-cloud/README.md

