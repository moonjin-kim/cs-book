domain:
  id: security
  name: Security
  summary: |
    인증·인가, HTTPS, 해시, 웹 취약점처럼 백엔드 개발자가 기본으로
    설명해야 하는 보안 질문을 정리한다.
  wiki_root: wiki/security/

entities:
  - id: authentication
    name: 인증
    type: process
    summary: 사용자가 누구인지 확인하는 절차로 비밀번호, 세션, 토큰, MFA가 사용된다.
    repo: cs-theory-notes
    package: security/authentication
    wiki_doc: wiki/security/README.md
  - id: mfa
    name: MFA와 재인증
    type: process
    summary: 비밀번호 외 추가 요소와 민감 작업 전 재인증으로 계정 탈취와 권한 남용 위험을 낮춘다.
    repo: cs-theory-notes
    package: security/mfa
    wiki_doc: wiki/security/README.md
  - id: jwt
    name: JWT
    type: data
    summary: Header, Payload, Signature로 구성된 토큰이며 탈취, 만료, 키 관리가 핵심 주의점이다.
    repo: cs-theory-notes
    package: security/jwt
    wiki_doc: wiki/security/README.md
  - id: authorization
    name: 인가
    type: process
    summary: 인증된 사용자가 특정 리소스나 기능을 사용할 권한이 있는지 판단한다.
    repo: cs-theory-notes
    package: security/authorization
    wiki_doc: wiki/security/README.md
  - id: access-control
    name: Access Control
    type: process
    summary: deny by default, least privilege, object-level check로 리소스 접근 권한을 서버에서 강제한다.
    repo: cs-theory-notes
    package: security/access-control
    wiki_doc: wiki/security/README.md
  - id: idor
    name: IDOR
    type: process
    summary: 객체 식별자를 바꿔 타인 리소스에 접근하는 Broken Access Control 유형이다.
    repo: cs-theory-notes
    package: security/idor
    wiki_doc: wiki/security/README.md
  - id: session-management
    name: Session Management
    type: process
    summary: 예측 불가능한 session id, 만료, rotation, server-side invalidation으로 인증 상태를 관리한다.
    repo: cs-theory-notes
    package: security/session-management
    wiki_doc: wiki/security/README.md
  - id: cookie-security
    name: Cookie Security
    type: data
    summary: Secure, HttpOnly, SameSite, Domain, Path로 cookie 전송 범위와 탈취·CSRF 위험을 줄인다.
    repo: cs-theory-notes
    package: security/cookie-security
    wiki_doc: wiki/security/README.md
  - id: refresh-token-rotation
    name: Refresh Token Rotation
    type: process
    summary: refresh token 재발급 시 이전 토큰을 폐기하고 재사용을 탐지해 탈취 피해를 줄인다.
    repo: cs-theory-notes
    package: security/refresh-token-rotation
    wiki_doc: wiki/security/README.md
  - id: cryptography
    name: 암호화
    type: process
    summary: 대칭키, 공개키, 서명, 키 교환으로 기밀성·무결성·인증을 제공한다.
    repo: cs-theory-notes
    package: security/crypto
    wiki_doc: wiki/security/README.md
  - id: https
    name: HTTPS
    type: process
    summary: TLS로 서버 인증, 키 교환, 대칭키 암호화를 수행해 HTTP 전송 구간을 보호한다.
    repo: cs-theory-notes
    package: security/https
    wiki_doc: wiki/security/README.md
  - id: hashing
    name: 해시와 패스워드 저장
    type: process
    summary: Salt와 느린 단방향 해시로 비밀번호 원문 복원을 어렵게 만든다.
    repo: cs-theory-notes
    package: security/hashing
    wiki_doc: wiki/security/README.md
  - id: password-policy
    name: Password Policy
    type: process
    summary: 충분한 길이, 유출 비밀번호 차단, login throttling, MFA로 계정 탈취 위험을 줄인다.
    repo: cs-theory-notes
    package: security/password-policy
    wiki_doc: wiki/security/README.md
  - id: owasp
    name: OWASP Top Risks
    type: data
    summary: Injection, XSS, 접근 제어 실패 같은 웹 애플리케이션 주요 위험 목록이다.
    repo: cs-theory-notes
    package: security/owasp
    wiki_doc: wiki/security/README.md
  - id: sql-injection
    name: SQL Injection
    type: process
    summary: 사용자 입력이 SQL 구조를 바꿔 의도하지 않은 조회나 변경을 일으키는 취약점이다.
    repo: cs-theory-notes
    package: security/sql-injection
    wiki_doc: wiki/security/README.md
  - id: command-injection
    name: Command Injection
    type: process
    summary: 사용자 입력이 OS shell command 구조를 바꿔 임의 명령 실행으로 이어지는 취약점이다.
    repo: cs-theory-notes
    package: security/command-injection
    wiki_doc: wiki/security/README.md
  - id: xss
    name: XSS
    type: process
    summary: 신뢰하지 못한 데이터가 브라우저에서 스크립트로 실행되어 세션 탈취와 화면 변조를 일으킨다.
    repo: cs-theory-notes
    package: security/xss
    wiki_doc: wiki/security/README.md
  - id: ssrf
    name: SSRF
    type: process
    summary: 서버가 공격자가 지정한 내부·외부 URL로 요청을 보내게 해 내부망 접근을 유발한다.
    repo: cs-theory-notes
    package: security/ssrf
    wiki_doc: wiki/security/README.md
  - id: csrf
    name: CSRF
    type: process
    summary: 로그인된 사용자의 브라우저를 이용해 의도하지 않은 상태 변경 요청을 보내는 공격이다.
    repo: cs-theory-notes
    package: security/csrf
    wiki_doc: wiki/security/README.md
  - id: cors-security
    name: CORS 보안
    type: process
    summary: 브라우저의 cross-origin response 노출 정책이며 인증·인가를 대체하지 않는다.
    repo: cs-theory-notes
    package: security/cors
    wiki_doc: wiki/security/README.md
  - id: csp
    name: Content Security Policy
    type: process
    summary: 브라우저가 로드하거나 실행할 리소스 출처를 제한해 XSS 피해를 완화한다.
    repo: cs-theory-notes
    package: security/csp
    wiki_doc: wiki/security/README.md
  - id: clickjacking
    name: Clickjacking
    type: process
    summary: frame embedding을 악용한 의도치 않은 클릭을 CSP frame-ancestors나 X-Frame-Options로 줄인다.
    repo: cs-theory-notes
    package: security/clickjacking
    wiki_doc: wiki/security/README.md
  - id: secret-management
    name: Secret Management
    type: process
    summary: API key, DB password, signing key를 코드가 아닌 안전한 저장소와 rotation 절차로 관리한다.
    repo: cs-theory-notes
    package: security/secret-management
    wiki_doc: wiki/security/README.md
  - id: supply-chain-security
    name: Supply Chain Security
    type: process
    summary: dependency, build pipeline, artifact 무결성, CI token 권한을 관리해 공급망 공격을 줄인다.
    repo: cs-theory-notes
    package: security/supply-chain
    wiki_doc: wiki/security/README.md
  - id: security-logging
    name: Security Logging
    type: process
    summary: 인증 실패, 권한 거부, 관리자 작업, token 폐기 같은 보안 이벤트를 구조적으로 기록하고 알림으로 연결한다.
    repo: cs-theory-notes
    package: security/logging
    wiki_doc: wiki/security/README.md
  - id: rate-limit
    name: Rate Limit
    type: process
    summary: 로그인, OTP, 결제, 쿠폰 같은 남용 지점에 요청 횟수 제한과 backoff를 적용한다.
    repo: cs-theory-notes
    package: security/rate-limit
    wiki_doc: wiki/security/README.md

