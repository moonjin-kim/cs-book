domain:
  id: security
  name: Security
  summary: |
    인증·인가, HTTPS, 해시, 웹 취약점처럼 백엔드 개발자가 기본으로
    설명해야 하는 보안 질문을 정리한다.
  wiki_root: wiki/security/

entities:
  - id: authentication
    name: 인증
    type: process
    summary: 사용자가 누구인지 확인하는 절차로 비밀번호, 세션, 토큰, MFA가 사용된다.
    repo: cs-theory-notes
    package: security/authentication
    wiki_doc: wiki/security/README.md
  - id: jwt
    name: JWT
    type: data
    summary: Header, Payload, Signature로 구성된 토큰이며 탈취, 만료, 키 관리가 핵심 주의점이다.
    repo: cs-theory-notes
    package: security/jwt
    wiki_doc: wiki/security/README.md
  - id: authorization
    name: 인가
    type: process
    summary: 인증된 사용자가 특정 리소스나 기능을 사용할 권한이 있는지 판단한다.
    repo: cs-theory-notes
    package: security/authorization
    wiki_doc: wiki/security/README.md
  - id: cryptography
    name: 암호화
    type: process
    summary: 대칭키, 공개키, 서명, 키 교환으로 기밀성·무결성·인증을 제공한다.
    repo: cs-theory-notes
    package: security/crypto
    wiki_doc: wiki/security/README.md
  - id: https
    name: HTTPS
    type: process
    summary: TLS로 서버 인증, 키 교환, 대칭키 암호화를 수행해 HTTP 전송 구간을 보호한다.
    repo: cs-theory-notes
    package: security/https
    wiki_doc: wiki/security/README.md
  - id: hashing
    name: 해시와 패스워드 저장
    type: process
    summary: Salt와 느린 단방향 해시로 비밀번호 원문 복원을 어렵게 만든다.
    repo: cs-theory-notes
    package: security/hashing
    wiki_doc: wiki/security/README.md
  - id: owasp
    name: OWASP Top Risks
    type: data
    summary: Injection, XSS, 접근 제어 실패 같은 웹 애플리케이션 주요 위험 목록이다.
    repo: cs-theory-notes
    package: security/owasp
    wiki_doc: wiki/security/README.md
  - id: sql-injection
    name: SQL Injection
    type: process
    summary: 사용자 입력이 SQL 구조를 바꿔 의도하지 않은 조회나 변경을 일으키는 취약점이다.
    repo: cs-theory-notes
    package: security/sql-injection
    wiki_doc: wiki/security/README.md
  - id: csrf
    name: CSRF
    type: process
    summary: 로그인된 사용자의 브라우저를 이용해 의도하지 않은 상태 변경 요청을 보내는 공격이다.
    repo: cs-theory-notes
    package: security/csrf
    wiki_doc: wiki/security/README.md

relations:
  - from: authorization
    to: authentication
    type: depends_on
  - from: authentication
    to: jwt
    type: produces
  - from: hashing
    to: authentication
    type: depends_on
  - from: authentication
    to: cryptography
    type: depends_on
  - from: https
    to: cryptography
    type: depends_on
  - from: owasp
    to: authorization
    type: depends_on
  - from: sql-injection
    to: owasp
    type: depends_on
  - from: csrf
    to: authentication
    type: depends_on
  - from: cryptography
    to: internet
    type: deployed_in
