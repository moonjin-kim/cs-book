domain:
  id: redis
  name: Redis
  summary: |
    Redis를 캐시, 분산 락, 메시지 처리, 고가용성 저장소로 사용할 때 필요한
    자료구조와 운영 주의점을 정리한다.
  wiki_root: wiki/redis/

entities:
  - id: data-structures
    name: Redis 자료구조
    type: data
    summary: String부터 Stream까지 각 자료구조가 어떤 연산에 강한지 기준을 잡는다.
    repo: cs-theory-notes
    package: redis/data-structures
    wiki_doc: wiki/redis/README.md
  - id: cache-strategy
    name: 캐시 전략
    type: process
    summary: Cache Aside, Write Through, TTL, 무효화 전략으로 DB 부하와 불일치를 조절한다.
    repo: cs-theory-notes
    package: redis/cache
    wiki_doc: wiki/redis/README.md
  - id: ttl-expiration
    name: TTL과 Expiration
    type: process
    summary: key 만료 시간과 lazy/active expiration으로 캐시 freshness와 메모리 회수를 제어한다.
    repo: cs-theory-notes
    package: redis/ttl-expiration
    wiki_doc: wiki/redis/README.md
  - id: cache-failure-modes
    name: Cache Stampede/Penetration/Avalanche
    type: failure-mode
    summary: 캐시 만료, 존재하지 않는 key, 동시 만료로 DB 부하가 급증하는 장애 패턴과 완화책이다.
    repo: cs-theory-notes
    package: redis/cache-failure-modes
    wiki_doc: wiki/redis/README.md
  - id: distributed-lock
    name: 분산 락
    type: process
    summary: SET NX PX와 만료 시간을 이용해 여러 서버의 동일 자원 접근을 제어한다.
    repo: cs-theory-notes
    package: redis/lock
    wiki_doc: wiki/redis/README.md
  - id: redlock
    name: RedLock
    type: process
    summary: 여러 Redis 노드의 과반수 락 획득으로 단일 노드 장애 위험을 줄이려는 알고리즘이다.
    repo: cs-theory-notes
    package: redis/redlock
    wiki_doc: wiki/redis/README.md
  - id: persistence
    name: RDB와 AOF
    type: process
    summary: RDB는 시점 스냅샷, AOF는 쓰기 로그를 저장해 복구성과 성능을 선택한다.
    repo: cs-theory-notes
    package: redis/persistence
    wiki_doc: wiki/redis/README.md
  - id: eviction
    name: Key Eviction
    type: process
    summary: maxmemory 초과 시 어떤 키를 먼저 제거할지 정하는 메모리 회수 정책이다.
    repo: cs-theory-notes
    package: redis/eviction
    wiki_doc: wiki/redis/README.md
  - id: hot-big-key
    name: Hot Key와 Big Key
    type: failure-mode
    summary: 특정 key 집중과 큰 key가 latency, network, memory, cluster slot 불균형에 주는 영향을 다룬다.
    repo: cs-theory-notes
    package: redis/hot-big-key
    wiki_doc: wiki/redis/README.md
  - id: pipelining
    name: Pipelining
    type: process
    summary: 여러 명령을 한 번에 보내 네트워크 왕복 시간을 줄이는 처리량 최적화 기법이다.
    repo: cs-theory-notes
    package: redis/pipelining
    wiki_doc: wiki/redis/README.md
  - id: transaction
    name: Redis Transaction
    type: process
    summary: MULTI/EXEC로 명령 묶음을 순차 실행하지만 RDBMS처럼 전체 롤백되지는 않는다.
    repo: cs-theory-notes
    package: redis/transaction
    wiki_doc: wiki/redis/README.md
  - id: lua-script
    name: Lua Script
    type: process
    summary: 여러 Redis 명령을 서버에서 하나의 원자적 script로 실행하지만 긴 script는 event loop를 막을 수 있다.
    repo: cs-theory-notes
    package: redis/lua-script
    wiki_doc: wiki/redis/README.md
  - id: pubsub-stream
    name: Pub/Sub과 Stream
    type: process
    summary: Pub/Sub은 실시간 전달, Stream은 저장·재처리·Consumer Group을 제공한다.
    repo: cs-theory-notes
    package: redis/pubsub-stream
    wiki_doc: wiki/redis/README.md
  - id: stream-consumer-group
    name: Stream Consumer Group
    type: process
    summary: Stream 메시지를 여러 consumer가 나눠 처리하고 ACK, pending, retry로 재처리를 관리한다.
    repo: cs-theory-notes
    package: redis/stream-consumer-group
    wiki_doc: wiki/redis/README.md
  - id: single-thread
    name: Redis Single Thread
    type: process
    summary: 명령 실행은 단일 스레드로 원자성을 유지하고, Redis 6부터 네트워크 I/O는 멀티스레드화됐다.
    repo: cs-theory-notes
    package: redis/single-thread
    wiki_doc: wiki/redis/README.md
  - id: replication-cluster
    name: 복제와 클러스터
    type: process
    summary: Sentinel은 장애 조치, Cluster는 해시 슬롯 기반 샤딩과 고가용성을 제공한다.
    repo: cs-theory-notes
    package: redis/cluster
    wiki_doc: wiki/redis/README.md
  - id: sentinel
    name: Redis Sentinel
    type: process
    summary: primary-replica 구성을 감시하고 장애 감지, 알림, 자동 failover, primary discovery를 제공한다.
    repo: cs-theory-notes
    package: redis/sentinel
    wiki_doc: wiki/redis/README.md
  - id: redis-cluster-slots
    name: Redis Cluster Hash Slot
    type: data
    summary: 16384 hash slot, hash tag, MOVED/ASK redirect, 같은 slot multi-key 제약을 설명한다.
    repo: cs-theory-notes
    package: redis/cluster-slots
    wiki_doc: wiki/redis/README.md

relations:
  - from: cache-strategy
    to: data-structures
    type: consumes
  - from: ttl-expiration
    to: cache-strategy
    type: depends_on
  - from: cache-failure-modes
    to: ttl-expiration
    type: failure_mode_of
  - from: distributed-lock
    to: data-structures
    type: consumes
  - from: redlock
    to: distributed-lock
    type: depends_on
  - from: redlock
    to: replication-cluster
    type: depends_on
  - from: persistence
    to: data-structures
    type: consumes
  - from: eviction
    to: cache-strategy
    type: depends_on
  - from: hot-big-key
    to: eviction
    type: failure_mode_of
  - from: pipelining
    to: data-structures
    type: consumes
  - from: transaction
    to: data-structures
    type: consumes
  - from: lua-script
    to: transaction
    type: depends_on
  - from: pubsub-stream
    to: data-structures
    type: depends_on
  - from: stream-consumer-group
    to: pubsub-stream
    type: depends_on
  - from: single-thread
    to: data-structures
    type: depends_on
  - from: replication-cluster
    to: persistence
    type: depends_on
  - from: sentinel
    to: replication-cluster
    type: depends_on
  - from: redis-cluster-slots
    to: replication-cluster
    type: depends_on
  - from: cache-strategy
    to: redis
    type: deployed_in
